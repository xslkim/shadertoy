<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css"></head><body>
<div class="page">
  <div class="title">Sphere Tracing：步进求交算法</div>

  <!-- 步进示意 -->
  <svg width="1760" height="430" viewBox="0 0 1760 430" style="margin-top:30px;align-self:center">
    <!-- 射线 -->
    <line x1="70" y1="250" x2="1660" y2="250" stroke="#30363d" stroke-width="2" stroke-dasharray="8 8"/>
    <!-- 相机 -->
    <path d="M40,220 L90,250 L40,280 Z" fill="#e6edf3"/>
    <text x="55" y="320" fill="#8b949e" font-size="22" class="label">相机</text>
    <!-- 障碍物 -->
    <circle cx="1560" cy="250" r="95" fill="#58a6ff" fill-opacity="0.2" stroke="#58a6ff" stroke-width="3"/>
    <text x="1560" y="258" fill="#8b949e" font-size="22" text-anchor="middle" class="label">物体表面</text>
    <!-- 步进圆 -->
    <circle cx="120" cy="250" r="300" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="6 7"/>
    <circle cx="120" cy="250" r="11" fill="#58a6ff"/>
    <text x="240" y="120" fill="#58a6ff" font-size="23" text-anchor="middle" class="mono">d = 1.8</text>
    <circle cx="720" cy="250" r="230" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="6 7"/>
    <circle cx="720" cy="250" r="10" fill="#58a6ff"/>
    <text x="800" y="160" fill="#58a6ff" font-size="23" text-anchor="middle" class="mono">d = 1.3</text>
    <circle cx="1180" cy="250" r="150" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="6 7"/>
    <circle cx="1180" cy="250" r="9" fill="#58a6ff"/>
    <text x="1220" y="230" fill="#58a6ff" font-size="22" text-anchor="middle" class="mono">d = 0.7</text>
    <circle cx="1390" cy="250" r="62" fill="none" stroke="#d29922" stroke-width="2.5" stroke-dasharray="6 7"/>
    <circle cx="1390" cy="250" r="8" fill="#d29922"/>
    <text x="1390" y="160" fill="#d29922" font-size="22" text-anchor="middle" class="mono">d = 0.3</text>
    <circle cx="1462" cy="250" r="14" fill="none" stroke="#3fb950" stroke-width="3"/>
    <circle cx="1462" cy="250" r="8" fill="#3fb950"/>
    <text x="1470" y="370" fill="#3fb950" font-size="23" text-anchor="middle" class="mono">d &lt; ε 命中！</text>
  </svg>

  <div class="row center" style="margin-top:24px">
    <div class="code" style="width:1380px"><span class="kw">float</span> t = tmin;
<span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">0</span>; i &lt; <span class="num">70</span> &amp;&amp; t &lt; tmax; i++) {
    <span class="kw">vec2</span> h = <span class="fn">map</span>(ro + rd * t);          <span class="com">// 查询当前位置的 SDF</span>
    <span class="kw">if</span> (<span class="fn">abs</span>(h.x) &lt; <span class="num">0.0001</span> * t) <span class="kw">break</span>;  <span class="com">// 足够接近 → 命中</span>
    t += h.x;                            <span class="com">// 安全前进 d 的距离</span>
}</div>
  </div>
  <div class="subtitle" style="margin-top:24px">SDF 值保证半径内绝对安全 · 越靠近表面步长越小 · 自然收敛</div>
</div>
</body></html>
