<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css"></head><body>
<div class="page">
  <div class="title">球的 SDF：最简单的例子</div>

  <div class="row grow gap-40" style="margin-top:40px;align-items:center">
    <!-- 左 -->
    <div class="col" style="width:1000px;gap:24px">
      <div class="formula">sdSphere(p) = |p| − r</div>
      <div class="col gap-16">
        <div style="font-size:27px">· <b>|p|</b> 即 length(p)，点 p 到原点的距离</div>
        <div style="font-size:27px">· <b>r</b> 是球的半径</div>
        <div style="font-size:27px">· 结果的正负号 = 点在球内还是球外</div>
      </div>
      <div class="code"><span class="kw">float</span> <span class="fn">sdSphere</span>(<span class="kw">vec3</span> p, <span class="kw">float</span> r) {
    <span class="kw">return</span> <span class="fn">length</span>(p) - r;
}

<span class="com">// 把球移到任意位置 center：传入 p - center</span>
<span class="fn">sdSphere</span>(pos - <span class="fn">vec3</span>(<span class="num">1.0</span>, <span class="num">0.5</span>, <span class="num">0.0</span>), <span class="num">0.25</span>);</div>
    </div>

    <!-- 右：几何 -->
    <svg width="720" height="700" viewBox="0 0 720 700">
      <line x1="60" y1="380" x2="680" y2="380" stroke="#30363d" stroke-width="2"/>
      <line x1="300" y1="60" x2="300" y2="650" stroke="#30363d" stroke-width="2"/>
      <circle cx="300" cy="380" r="170" fill="#58a6ff" fill-opacity="0.18" stroke="#58a6ff" stroke-width="3"/>
      <circle cx="300" cy="380" r="6" fill="#fff"/>
      <text x="300" y="420" fill="#8b949e" font-size="22" text-anchor="middle" class="label">原点</text>
      <!-- 半径箭头 -->
      <line x1="300" y1="380" x2="470" y2="380" stroke="#ffa657" stroke-width="4" marker-end="url(#ar)"/>
      <text x="385" y="362" fill="#ffa657" font-size="34" text-anchor="middle" class="mono" font-weight="700">r</text>
      <!-- 外点 -->
      <line x1="610" y1="170" x2="403" y2="295" stroke="#3fb950" stroke-width="2" stroke-dasharray="5 5"/>
      <circle cx="610" cy="170" r="8" fill="#3fb950"/>
      <text x="615" y="150" fill="#3fb950" font-size="23" class="mono">+0.9</text>
      <!-- 内点 -->
      <line x1="345" y1="430" x2="382" y2="467" stroke="#f85149" stroke-width="2" stroke-dasharray="5 5"/>
      <circle cx="345" cy="430" r="8" fill="#f85149"/>
      <text x="250" y="455" fill="#f85149" font-size="23" class="mono">-0.3</text>
      <!-- 平移 -->
      <path d="M300,600 L520,600" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#ar2)"/>
      <text x="410" y="585" fill="#8b949e" font-size="24" text-anchor="middle" class="mono">p − center</text>
      <defs>
        <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#ffa657"/></marker>
        <marker id="ar2" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#8b949e"/></marker>
      </defs>
    </svg>
  </div>
</div>
</body></html>
