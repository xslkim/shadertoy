<div class="page">
  <div class="title-row">
    <div class="title">总结：几百行数学，一片海</div>
    <div class="underline" style="width:420px"></div>
  </div>

  <div class="card" style="margin-top:38px;padding:32px 40px">
    <div class="card-title accent" style="margin-bottom:20px">完整知识链路</div>
    <div class="row" style="align-items:center;flex-wrap:wrap;gap:12px 8px">
      <div class="col center" style="background:#161b22;border:1px solid #30363d;border-radius:9px;padding:12px 16px">
        <div style="font-size:22px;font-weight:700">hash</div></div>
      <div class="accent" style="font-size:26px">→</div>
      <div class="col center" style="background:#161b22;border:1px solid #30363d;border-radius:9px;padding:12px 16px">
        <div style="font-size:22px;font-weight:700">噪声</div></div>
      <div class="accent" style="font-size:26px">→</div>
      <div class="col center" style="background:#161b22;border:1px solid #30363d;border-radius:9px;padding:12px 16px">
        <div style="font-size:22px;font-weight:700">FBM</div></div>
      <div class="accent" style="font-size:26px">→</div>
      <div class="col center" style="background:#161b22;border:1px solid #30363d;border-radius:9px;padding:12px 16px">
        <div style="font-size:22px;font-weight:700">高度场</div></div>
      <div class="accent" style="font-size:26px">→</div>
      <div class="col center" style="background:#161b22;border:1px solid #30363d;border-radius:9px;padding:12px 16px">
        <div style="font-size:22px;font-weight:700">光线步进</div></div>
      <div class="accent" style="font-size:26px">→</div>
      <div class="col center" style="background:#161b22;border:1px solid #30363d;border-radius:9px;padding:12px 16px">
        <div style="font-size:22px;font-weight:700">法线 / 光照</div></div>
      <div class="accent" style="font-size:26px">→</div>
      <div class="col center" style="background:#161b22;border:1px solid #30363d;border-radius:9px;padding:12px 16px">
        <div style="font-size:22px;font-weight:700">菲涅尔</div></div>
      <div class="accent" style="font-size:26px">→</div>
      <div class="col center" style="background:#0d2236;border:1px solid #58a6ff;border-radius:9px;padding:12px 16px">
        <div class="accent" style="font-size:22px;font-weight:700">水色</div></div>
    </div>
  </div>

  <div class="row gap-24" style="margin-top:24px">
    <div class="card col" style="flex:1;padding:26px 32px">
      <div class="card-title" style="font-size:28px">一个小 Shader，全部核心思想</div>
      <div class="card-desc" style="font-size:23px;margin-top:10px;line-height:1.6">
        Seascape 不大，却串起了水体渲染几乎所有基础。<br>
        业界走得更远 —— 频谱模拟、专门的细节系统、光追、AI ——<br>
        但地基，是一样的。
      </div>
    </div>
    <div class="card col" style="flex:1;padding:26px 32px;border-color:#3fb950">
      <div class="card-title green" style="font-size:28px">最好的学习：动手改</div>
      <div class="card-desc" style="font-size:23px;margin-top:10px;line-height:1.6">
        打开 shader.glsl，改一改：<br>
        · choppy —— 浪的尖锐程度<br>
        · 倍频层数 —— 海面的细节<br>
        · 颜色常数 —— 海与天的色调
      </div>
    </div>
  </div>

  <div class="subtitle" style="margin-top:24px">看这片海，怎么随你的手变化</div>
