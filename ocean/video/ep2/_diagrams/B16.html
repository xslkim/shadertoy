<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css"></head><body>
<div class="page">
  <div class="title">引擎与生产工具</div>

  <div class="row center gap-24" style="margin-top:44px">
    <div class="col card" style="width:740px;height:330px">
      <div class="row" style="align-items:center;gap:14px">
        <div style="font-size:42px">🎮</div>
        <div class="card-title accent">UE5 Water System</div>
      </div>
      <div class="card-desc" style="margin-top:16px;line-height:1.75;font-size:24px">
        虚幻引擎 5 内置的水系统，基于 Gerstner 波。<br>
        用样条驱动河流、湖泊，与地形无缝融合，<br>
        开箱即用，是当下游戏做水的常见起点。
      </div>
    </div>
    <div class="col card" style="width:740px;height:330px">
      <div class="row" style="align-items:center;gap:14px">
        <div style="font-size:42px">🎬</div>
        <div class="card-title accent">Houdini · 电影级</div>
      </div>
      <div class="card-desc" style="margin-top:16px;line-height:1.75;font-size:24px">
        电影领域用 Houdini 的海洋频谱与 FLIP 流体工具，<br>
        离线模拟出影视级的海面、巨浪与飞溅，<br>
        精度优先，不要求实时。
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:28px;padding:30px 40px;border-color:#3fb950">
    <div class="card-title green">游戏案例</div>
    <div class="row gap-32" style="margin-top:16px">
      <div class="col grow"><div style="font-size:25px;font-weight:700">《盗贼之海》</div>
        <div class="card-desc" style="font-size:22px;margin-top:4px">出了名的好水，风格化 + 定制波形</div></div>
      <div class="col grow"><div style="font-size:25px;font-weight:700">《刺客信条》</div>
        <div class="card-desc" style="font-size:22px;margin-top:4px">大航海场景，FFT 海洋</div></div>
      <div class="col grow"><div style="font-size:25px;font-weight:700">《地平线 西之绝境》</div>
        <div class="card-desc" style="font-size:22px;margin-top:4px">大面积逼真水体</div></div>
    </div>
    <div class="card-desc" style="font-size:23px;margin-top:18px">它们大多是 <b class="accent">FFT 基础波形 + Gerstner 大涌浪</b> 的组合</div>
  </div>
</div>
</body></html>
