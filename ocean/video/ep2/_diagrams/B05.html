<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css"></head><body>
<div class="page">
  <div class="title">漫反射：表面被照亮的基本量</div>

  <div class="row grow gap-40" style="margin-top:40px;align-items:center">
    <!-- 左：几何 -->
    <div class="col" style="width:820px;gap:16px">
      <svg width="780" height="420" viewBox="0 0 780 420">
        <path d="M120,330 A270,270 0 0,1 660,330 Z" fill="#0d2236" stroke="#30363d" stroke-width="2"/>
        <circle cx="390" cy="62" r="9" fill="#fff"/>
        <line x1="390" y1="62" x2="390" y2="-20" stroke="#ffa657" stroke-width="5" marker-end="url(#dn)"/>
        <text x="410" y="30" fill="#ffa657" font-size="24" class="mono">n 法线</text>
        <line x1="390" y1="62" x2="210" y2="-8" stroke="#d29922" stroke-width="5" marker-end="url(#dl)"/>
        <text x="120" y="20" fill="#d29922" font-size="24" class="mono">l 光方向</text>
        <path d="M360,90 A40,40 0 0,1 333,55" fill="none" stroke="#e6edf3" stroke-width="2"/>
        <text x="320" y="100" fill="#e6edf3" font-size="22" class="mono">θ</text>
        <text x="390" y="160" fill="#8b949e" font-size="21" text-anchor="middle" class="label">交点 P</text>
        <text x="390" y="210" fill="#8b949e" font-size="20" text-anchor="middle" class="label">夹角 θ 越小（越正对光），越亮</text>
        <defs>
          <marker id="dn" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ffa657"/></marker>
          <marker id="dl" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d29922"/></marker>
        </defs>
      </svg>
    </div>
    <!-- 右 -->
    <div class="col" style="width:920px;gap:20px">
      <div class="card">
        <div class="card-title">标准漫反射 Lambert</div>
        <div class="mono" style="font-size:28px;margin-top:8px">dif = max(0, dot(n, l))</div>
        <div class="card-desc" style="font-size:23px;margin-top:6px">背光的一面直接全黑</div>
      </div>
      <div class="card" style="border-color:#58a6ff">
        <div class="card-title accent">Seascape 的改良版</div>
        <div class="mono" style="font-size:28px;margin-top:8px">dif = pow(dot(n,l) * 0.4 + 0.6, p)</div>
        <div class="card-desc" style="font-size:23px;margin-top:6px">把范围抬高，背光面也保留一点亮度</div>
      </div>
      <div class="step">
        <div class="step-h">为什么这样改</div>
        <div class="step-d">水是半透明的，光会透进水体再透出来 —— 背光面不该是死黑</div>
      </div>
    </div>
  </div>
</div>
</body></html>
