<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css"></head><body>
<div class="page">
  <div class="title">高光：水面上那粒阳光</div>

  <div class="row grow gap-40" style="margin-top:40px;align-items:center">
    <!-- 左：几何 -->
    <div class="col" style="width:880px;gap:16px">
      <svg width="820" height="430" viewBox="0 0 820 430">
        <path d="M150,360 A260,260 0 0,1 670,360 Z" fill="#0d2236" stroke="#30363d" stroke-width="2"/>
        <circle cx="410" cy="102" r="9" fill="#fff"/>
        <!-- 法线 -->
        <line x1="410" y1="102" x2="410" y2="28" stroke="#ffa657" stroke-width="4" marker-end="url(#sn)"/>
        <text x="428" y="48" fill="#ffa657" font-size="22" class="mono">n</text>
        <!-- 视线入射 -->
        <line x1="208" y1="40" x2="410" y2="102" stroke="#e6edf3" stroke-width="4" marker-end="url(#se)"/>
        <text x="120" y="34" fill="#e6edf3" font-size="22" class="mono">视线 eye</text>
        <!-- 反射线 -->
        <line x1="410" y1="102" x2="588" y2="44" stroke="#58a6ff" stroke-width="4" marker-end="url(#sr)"/>
        <text x="455" y="74" fill="#58a6ff" font-size="21" class="mono">反射方向</text>
        <!-- 光源 -->
        <circle cx="648" cy="30" r="19" fill="#d29922"/>
        <text x="690" y="38" fill="#d29922" font-size="21" class="label">光源</text>
        <text x="410" y="200" fill="#8b949e" font-size="21" text-anchor="middle" class="label">反射线越接近光源 → 高光越强</text>
        <defs>
          <marker id="sn" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ffa657"/></marker>
          <marker id="se" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e6edf3"/></marker>
          <marker id="sr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#58a6ff"/></marker>
        </defs>
      </svg>
    </div>
    <!-- 右 -->
    <div class="col" style="width:920px;gap:20px">
      <div class="card">
        <div class="card-title accent">高光的算法</div>
        <div class="card-desc" style="margin-top:10px;line-height:1.7">
          ① 把视线沿法线<b>反射</b>出去<br>
          ② 看反射线与<b>光源方向</b>有多接近<br>
          ③ 用 pow(·, s) 控制高光范围
        </div>
      </div>
      <div class="row gap-24">
        <div class="card col center" style="flex:1">
          <div class="muted" style="font-size:24px">s 小</div>
          <div style="font-size:30px;font-weight:700;margin-top:6px">大而柔的光斑</div>
        </div>
        <div class="card col center" style="flex:1;border-color:#58a6ff">
          <div class="accent" style="font-size:24px">s 大（=60）</div>
          <div style="font-size:30px;font-weight:700;margin-top:6px">小而锐的亮点</div>
        </div>
      </div>
      <div class="step">
        <div class="step-h">这就是阳光在水面的反光</div>
        <div class="step-d">Seascape 用 s=60，得到一粒紧致、耀眼的太阳光斑</div>
      </div>
    </div>
  </div>
</div>
</body></html>
