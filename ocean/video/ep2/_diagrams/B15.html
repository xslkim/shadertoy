<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css"></head><body>
<div class="page">
  <div class="title">让水"活"起来的细节技术</div>
  <div class="subtitle" style="margin-top:8px">光有水面形状还不够，可信的水靠这些细节</div>

  <div class="row center gap-24" style="margin-top:40px">
    <div class="col card" style="width:480px;height:300px">
      <div style="font-size:44px">🫧</div>
      <div class="card-title" style="font-size:28px;margin-top:6px">泡沫 Foam</div>
      <div class="card-desc" style="font-size:23px;margin-top:10px;line-height:1.6">浪太陡、浪峰折叠、或靠近岸边时，水面泛起白色泡沫</div>
    </div>
    <div class="col card" style="width:480px;height:300px">
      <div style="font-size:44px">🪞</div>
      <div class="card-title" style="font-size:28px;margin-top:6px">屏幕空间反射 SSR</div>
      <div class="card-desc" style="font-size:23px;margin-top:10px;line-height:1.6">用已渲染的画面，让水面映出真实场景，而不只是天空</div>
    </div>
    <div class="col card" style="width:480px;height:300px">
      <div style="font-size:44px">✨</div>
      <div class="card-title" style="font-size:28px;margin-top:6px">焦散 Caustics</div>
      <div class="card-desc" style="font-size:23px;margin-top:10px;line-height:1.6">阳光被起伏的水面折射，在海底投下流动的亮斑</div>
    </div>
  </div>
  <div class="row center gap-24" style="margin-top:24px">
    <div class="col card" style="width:480px;height:300px">
      <div style="font-size:44px">🟢</div>
      <div class="card-title" style="font-size:28px;margin-top:6px">次表面散射 SSS</div>
      <div class="card-desc" style="font-size:23px;margin-top:10px;line-height:1.6">逆光时光线穿透浪尖，透出那种通透的翠绿色</div>
    </div>
    <div class="col card" style="width:480px;height:300px">
      <div style="font-size:44px">🌫️</div>
      <div class="card-title" style="font-size:28px;margin-top:6px">水下吸收与雾</div>
      <div class="card-desc" style="font-size:23px;margin-top:10px;line-height:1.6">水越深颜色越被吸收，加上水下雾与丁达尔光束</div>
    </div>
    <div class="col card" style="width:480px;height:300px">
      <div style="font-size:44px">🚤</div>
      <div class="card-title" style="font-size:28px;margin-top:6px">浪与物体交互</div>
      <div class="card-desc" style="font-size:23px;margin-top:10px;line-height:1.6">船、角色推开水面，产生涟漪与尾迹</div>
    </div>
  </div>
</div>
</body></html>
