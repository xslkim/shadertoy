<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="theme.css"></head><body>
<div class="page">
  <div class="title">新技术与新方向</div>

  <div class="col center gap-24" style="margin-top:48px">
    <div class="card row" style="width:1560px;align-items:center;gap:32px;padding:30px 40px;border-color:#58a6ff">
      <div style="font-size:60px">🔆</div>
      <div class="col">
        <div class="card-title accent">实时光线追踪</div>
        <div class="card-desc" style="margin-top:8px;font-size:24px;line-height:1.6">
          硬件光追让水面能真实地反射、折射整个环境，焦散也算得更准 ——
          不再只能反射天空或屏幕里已有的东西。
        </div>
      </div>
    </div>
    <div class="card row" style="width:1560px;align-items:center;gap:32px;padding:30px 40px;border-color:#3fb950">
      <div style="font-size:60px">💧</div>
      <div class="col">
        <div class="card-title green">大规模流体模拟</div>
        <div class="card-desc" style="margin-top:8px;font-size:24px;line-height:1.6">
          FLIP / APIC 等流体解算逐步实时化，让浪和物体真正<b>双向</b>相互推挤，
          而不只是物体在固定波形上漂浮。
        </div>
      </div>
    </div>
    <div class="card row" style="width:1560px;align-items:center;gap:32px;padding:30px 40px;border-color:#d29922">
      <div style="font-size:60px">🧠</div>
      <div class="col">
        <div class="card-title yellow">神经网络与 AI</div>
        <div class="card-desc" style="margin-top:8px;font-size:24px;line-height:1.6">
          用神经网络加速泡沫与浪花、直接生成波形频谱、为模拟做超分辨率，
          也用于给光追结果实时降噪。
        </div>
      </div>
    </div>
  </div>

  <div class="subtitle" style="margin-top:40px">方向很多，但底层原理一脉相承 —— 都建立在本期讲的这些基础之上</div>
</div>
</body></html>
